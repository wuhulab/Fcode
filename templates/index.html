<!DOCTYPE html>
<!-- 什么时候我要把这些SVG文件给提取出来 -->
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 移动端优化 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>FCode IDE</title>
    
    <!-- Monaco Editor CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/editor/editor.main.css">
    
    <!-- 自定义样式 -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="topbar" id="topbar">
        <div class="topbar-left">
            <span class="logo">FCode</span>
            <button class="topbar-menu-btn" id="toggleSidebar" title="切换侧边栏 (Ctrl+B)">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M2 2h3v12H2V2zm4 0h1v12H6V2zm2 0h2v12H8V2zm3 0h3v12h-3V2z"/>
                </svg>
            </button>
            <button class="topbar-menu-btn" id="fileBtn" title="文件">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M3 2h6l4 4v8a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1zm5.5 1.5V6h2.5l-2.5-2.5z"/>
                </svg>
                <span>文件</span>
            </button>
            <button class="topbar-menu-btn" id="settingsBtn" title="设置">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M8 1l-.5.5-.3 1.2-.6.1-.9-.8-.7.2.1 1.1-.5.4-1.1-.3-.4.5.7.9-.2.6-1.2.3v.7l1.2.3.2.6-.7.9.4.5 1.1-.3.5.4-.1 1.1.7.2.9-.8.6.1.3 1.2h.7l.3-1.2.6-.1.9.8.7-.2-.1-1.1.5-.4 1.1.3.4-.5-.7-.9.2-.6 1.2-.3v-.7l-1.2-.3-.2-.6.7-.9-.4-.5-1.1.3-.5-.4.1-1.1-.7-.2-.9.8-.6-.1L8.5 1H8zm0 4a2 2 0 1 1 0 4 2 2 0 0 1 0-4z"/>
                </svg>
                <span>设置</span>
            </button>
            <button class="topbar-menu-btn" id="aboutBtn" title="关于">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1zm0 13A6 6 0 1 1 8 2a6 6 0 0 1 0 12zm.5-9.5v1h-1v-1h1zm0 2v4h-1v-4h1z"/>
                </svg>
                <span>关于</span>
            </button>
        </div>
        <div class="topbar-right">
            <button class="action-btn" id="runBtn" title="运行 (Ctrl+R)">
                运行
            </button>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="main-container" id="mainContainer">
        <!-- 左侧边栏 - 文件浏览器 -->
        <aside class="sidebar" id="sidebar">
            <!-- 侧边栏标题栏 -->
            <div class="sidebar-header">
                <div class="sidebar-title">
                    <span class="sidebar-icon"><span class="tree-icon folder-icon" style="width:14px;height:14px;display:inline-block;"></span></span>
                    <span class="sidebar-title-text">资源</span>
                </div>
                <div class="sidebar-toolbar">
                    <button class="toolbar-btn" id="saveAllBtn" title="保存所有文件 (Ctrl+Shift+S)">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                            <path d="M14 1H2a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1zm-1 12H3V3h10v10z"/>
                            <path d="M5 5h6v1H5V5zm0 2h6v1H5V7zm0 2h4v1H5V9z"/>
                            <path d="M11 11v2h-1v-2h1z" fill="#4ec9b0"/>
                        </svg>
                    </button>
                    <button class="toolbar-btn" id="newFileBtnSidebar" title="新建文件 (Ctrl+N)">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                            <path d="M9 1H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V6l-5-5zm4 12H4V3h4v3h3v7z"/>
                            <path d="M8 7v2H6v1h2v2h1v-2h2v-1H9V7H8z"/>
                        </svg>
                    </button>
                    <button class="toolbar-btn" id="newFolderBtn" title="新建文件夹">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                            <path d="M14 4H8l-1-1H2a1 1 0 0 0-1 1v9a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V5a1 1 0 0 0-1-1zm-1 8H3V6h10v6z"/>
                            <path d="M7 8v2H5v1h2v2h1v-2h2v-1H8V8H7z"/>
                        </svg>
                    </button>
                </div>
            </div>
            
            <!-- 文件树容器 -->
            <div class="file-tree-container">
                <div class="file-tree" id="fileTree">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <span>加载中...</span>
                    </div>
                </div>
            </div>
            
            <!-- 侧边栏拖拽调整宽度的手柄 -->
            <div class="sidebar-resize-handle" id="sidebarResizeHandle"></div>
        </aside>

        <!-- 编辑器区域 -->
        <section class="editor-container" id="editorContainer">
            <!-- 标签页栏（放在编辑器上方） -->
            <div class="tabs-bar" id="tabsBar" style="display: none;">
                <!-- 标签页将动态添加到这里 -->
            </div>
            
            <!-- 欢迎界面（无文件时显示） -->
            <div class="welcome-screen" id="welcomeScreen">
                <div class="welcome-content">
                    <h1>FCode IDE</h1>
                    <p>简约 · 高效 · 轻量级代码编辑器</p>
                    <div class="quick-actions">
                        <button class="quick-btn" onclick="createNewFile()">
                            新建文件
                        </button>
                    </div>
                    <div class="shortcuts-info">
                        <h3>快捷键</h3>
                        <ul>
                            <li><kbd>Ctrl + Shift + S</kbd> 保存所有文件</li>
                            <li><kbd>Ctrl + R</kbd> 运行文件</li>
                            <li><kbd>Ctrl + N</kbd> 新建文件</li>
                            <li><kbd>Ctrl + B</kbd> 切换侧边栏</li>
                        </ul>
                    </div>
                </div>
            </div>

            <!-- 项目文件夹选择界面（启动时显示） -->
            <div class="workspace-picker" id="workspacePicker" style="display: none;">
                <div class="workspace-picker-content">
                    <div class="workspace-picker-icon"><span class="tree-icon folder-icon" style="width:48px;height:48px;display:inline-block;"></span></div>
                    <h2>打开项目文件夹</h2>
                    <p>输入或浏览选择一个项目文件夹开始编辑</p>
                    
                    <!-- 路径输入区域 -->
                    <div class="workspace-input-group">
                        <input type="text" id="workspacePathInput" 
                               placeholder="输入文件夹路径，如 C:\Projects\myapp" 
                               autocomplete="off" spellcheck="false">
                        <button class="workspace-browse-btn" id="workspaceBrowseBtn" title="浏览文件夹">
                            浏览
                        </button>
                    </div>
                    
                    <!-- 错误提示 -->
                    <div class="workspace-error" id="workspaceError" style="display: none;"></div>
                    
                    <!-- 确认按钮 -->
                    <button class="workspace-confirm-btn" id="workspaceConfirmBtn">
                        打开文件夹
                    </button>
                    
                    <!-- 目录浏览器 -->
                    <div class="directory-browser" id="directoryBrowser" style="display: none;">
                        <div class="browser-header">
                            <button class="browser-back-btn" id="browserBackBtn" title="返回上级目录">← 上级</button>
                            <span class="browser-current-path" id="browserCurrentPath">/</span>
                        </div>
                        <div class="browser-list" id="browserList">
                            <div class="loading">加载中...</div>
                        </div>
                    </div>
                    
                    <!-- 最近打开（预留） -->
                    <div class="workspace-recent" id="workspaceRecent" style="display: none;">
                        <h3>最近打开</h3>
                        <div class="recent-list" id="recentList"></div>
                    </div>
                </div>
            </div>

            <!-- Monaco 编辑器挂载点 -->
            <div class="monaco-wrapper" id="monacoWrapper" style="display: none;">
                <div id="monacoEditor"></div>
            </div>
        </section>
    </main>

    <!-- 底部状态栏 -->
    <footer class="statusbar" id="statusbar">
        <div class="status-left">
            <button class="statusbar-btn" id="gitBtn" title="Git">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M8 1C4.1 1 1 4.1 1 8c0 3.1 2 5.7 4.8 6.6.4.1.5-.1.5-.4v-1.4c-1.9.4-2.3-.9-2.3-.9-.3-.8-.8-1-.8-1-.6-.4.1-.4.1-.4.7.1 1 .7 1 .7.6 1.1 1.6.8 2 .6.1-.5.3-.8.5-1-1.7-.2-3.5-.9-3.5-3.8 0-.8.3-1.5.8-2.1-.1-.2-.3-1 .1-2.1 0 0 .7-.2 2.2.8.6-.2 1.3-.3 2-.3s1.4.1 2 .3c1.5-1 2.2-.8 2.2-.8.4 1.1.2 1.9.1 2.1.5.5.8 1.2.8 2.1 0 3-1.8 3.6-3.5 3.8.3.2.5.7.5 1.4v2.1c0 .3.1.5.5.4C13 13.7 15 11.1 15 8c0-3.9-3.1-7-7-7z"/>
                </svg>
                <span>Git</span>
            </button>
            <button class="statusbar-btn" id="terminalBtn" title="终端">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M2 2h12v12H2V2zm1 1v10h10V3H3zm1 2l2.5 2L4 9l.7.7L7.5 7 4.7 4.3 4 5zm4 5h4v1H8v-1z"/>
                </svg>
                <span>终端</span>
            </button>
            <button class="statusbar-btn" id="browserBtn" title="浏览器">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1zm0 13A6 6 0 1 1 8 2a6 6 0 0 1 0 12zM7 4h2v1H7V4zm0 2h2v6H7V6z"/>
                </svg>
                <span>浏览器</span>
            </button>
        </div>
        <div class="status-right">
            <span id="cursorPosition">行 1, 列 1</span>
            <span id="encoding">UTF-8</span>
            <span id="languageMode">纯文本</span>
            <span class="connection-status" id="connectionStatus">已连接</span>
        </div>
    </footer>

    <!-- 右键菜单（隐藏） -->
    <div class="context-menu" id="contextMenu" style="display: none;">
        <div class="menu-item" data-action="newFile">新建文件</div>
        <div class="menu-item" data-action="newFolder">新建文件夹</div>
        <div class="menu-divider"></div>
        <div class="menu-item" data-action="rename">[重命名]</div>
        <div class="menu-item" data-action="delete">[删除]</div>
    </div>

    <!-- 模态框：新建/重命名 -->
    <div class="modal-overlay" id="modalOverlay" style="display: none;">
        <div class="modal">
            <h3 id="modalTitle">新建文件</h3>
            <input type="text" id="modalInput" placeholder="输入名称..." autocomplete="off">
            <div class="modal-buttons">
                <button class="btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn-primary" id="modalConfirm">确认</button>
            </div>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div class="toast" id="toast" style="display: none;"></div>

    <!-- Monaco Editor CDN JS -->
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
    
    <!-- Socket.IO CDN -->
    <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.5/dist/socket.io.min.js"></script>
    
    <!-- xterm.js CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    
    <!-- 应用逻辑 -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
